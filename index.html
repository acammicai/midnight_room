      <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Audio Player</title>
<style>
body {background:#0b0c10; color:#66fcf1; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:'Segoe UI', sans-serif;}
input, button {padding:10px; margin:10px; border-radius:8px; border:none;}
button {background:#1f2833; color:#66fcf1; cursor:pointer;}
button:hover {background:#45a29e;}
iframe {width:0; height:0; border:0; /* hide video */ }
</style>
</head>
<body>

<h2>YouTube Audio Player</h2>
<input type="text" id="yt-link" placeholder="Paste YouTube link here">
<button id="play-btn">Play Audio</button>
<div id="player"></div>

<script>
const btn = document.getElementById('play-btn');
const input = document.getElementById('yt-link');
const playerDiv = document.getElementById('player');

btn.addEventListener('click', ()=>{
  let url = input.value.trim();
  if(!url) return alert("Paste a YouTube link!");
  
  // Extract video ID from URL
  const regex = /(?:youtube\.com.*v=|youtu\.be\/)([a-zA-Z0-9_-]+)/;
  const match = url.match(regex);
  if(!match) return alert("Invalid YouTube link!");
  const videoID = match[1];

  // Create iframe
  playerDiv.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoID}?autoplay=1&controls=0&modestbranding=1" allow="autoplay"></iframe>`;
});
</script>

</body>
</html>
