<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Midnight Room</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="room">
    <canvas id="particles"></canvas>
    <img src="assets/object.png" id="clickable-object" alt="Object">
    <div id="message">✨ Click the object for a hidden message ✨</div>
    <button id="music-btn">🎧 Play Lo-fi</button>
  </div>

  <audio id="music" src="music.mp3" loop></audio>

  <script src="script.js"></script>
</body>
</html>
